    max_jerk: [2.0]
  base_y_joint:
    max_acceleration: [0.5]
    max_jerk: [2.0]
  base_yaw_joint:
    max_acceleration: [0.5]
    max_jerk: [2.0]
  lift_joint:
    max_acceleration: [0.5]
    max_jerk: [2.0]
  arm_l1_joint:
